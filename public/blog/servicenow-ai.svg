<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2536"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)" rx="16"/>
  <!-- Workflow pipeline -->
  <rect x="100" y="160" width="120" height="80" rx="12" fill="#1e293b" stroke="#facc15" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#facc15" font-weight="600">PREDICT</text>
  <text x="160" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Intelligence</text>
  <rect x="280" y="160" width="120" height="80" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <text x="340" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8" font-weight="600">AUTOMATE</text>
  <text x="340" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Workflows</text>
  <rect x="460" y="160" width="120" height="80" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  <text x="520" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#34d399" font-weight="600">ASSIST</text>
  <text x="520" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Virtual Agent</text>
  <rect x="640" y="160" width="120" height="80" rx="12" fill="#1e293b" stroke="#f472b6" stroke-width="1.5" opacity="0.8"/>
  <text x="700" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f472b6" font-weight="600">GENERATE</text>
  <text x="700" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">GenAI</text>
  <!-- Connecting arrows -->
  <line x1="220" y1="200" x2="280" y2="200" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="200" x2="460" y2="200" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
  <line x1="580" y1="200" x2="640" y2="200" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
  <!-- Decorative -->
  <circle cx="250" cy="200" r="4" fill="#94a3b8" opacity="0.4"/>
  <circle cx="430" cy="200" r="4" fill="#94a3b8" opacity="0.4"/>
  <circle cx="610" cy="200" r="4" fill="#94a3b8" opacity="0.4"/>
  <!-- Stats -->
  <text x="160" y="100" text-anchor="middle" font-family="system-ui" font-size="28" fill="#facc15" font-weight="700" opacity="0.6">40%</text>
  <text x="160" y="118" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Faster Routing</text>
  <text x="520" y="100" text-anchor="middle" font-family="system-ui" font-size="28" fill="#34d399" font-weight="700" opacity="0.6">50%</text>
  <text x="520" y="118" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Less MTTR</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui" font-size="13" fill="#94a3b8" letter-spacing="3" font-weight="600">SERVICENOW AI</text>
</svg>
