<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)" rx="16"/>
  <!-- Agent loop circle -->
  <circle cx="400" cy="190" r="100" fill="none" stroke="#facc15" stroke-width="2" opacity="0.3" stroke-dasharray="8 6"/>
  <circle cx="400" cy="190" r="60" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.2"/>
  <!-- Loop steps -->
  <circle cx="400" cy="90" r="16" fill="#facc15" opacity="0.8"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">O</text>
  <circle cx="500" cy="190" r="16" fill="#38bdf8" opacity="0.8"/>
  <text x="500" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">T</text>
  <circle cx="400" cy="290" r="16" fill="#34d399" opacity="0.8"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">A</text>
  <circle cx="300" cy="190" r="16" fill="#f472b6" opacity="0.8"/>
  <text x="300" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a" font-weight="700">R</text>
  <!-- Step labels -->
  <text x="400" y="65" text-anchor="middle" font-family="system-ui" font-size="10" fill="#facc15" opacity="0.7">OBSERVE</text>
  <text x="540" y="195" text-anchor="start" font-family="system-ui" font-size="10" fill="#38bdf8" opacity="0.7">THINK</text>
  <text x="400" y="330" text-anchor="middle" font-family="system-ui" font-size="10" fill="#34d399" opacity="0.7">ACT</text>
  <text x="260" y="195" text-anchor="end" font-family="system-ui" font-size="10" fill="#f472b6" opacity="0.7">REFLECT</text>
  <!-- Arrows on circle -->
  <path d="M415 92 L490 175" stroke="#94a3b8" stroke-width="1" opacity="0.3" fill="none" marker-end="none"/>
  <path d="M490 205 L415 288" stroke="#94a3b8" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M385 288 L310 205" stroke="#94a3b8" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M310 175 L385 92" stroke="#94a3b8" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- Tools floating -->
  <rect x="140" y="100" width="60" height="30" rx="6" fill="#1e293b" stroke="#293548" stroke-width="1"/>
  <text x="170" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">API</text>
  <rect x="600" y="100" width="70" height="30" rx="6" fill="#1e293b" stroke="#293548" stroke-width="1"/>
  <text x="635" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">CODE</text>
  <rect x="600" y="270" width="70" height="30" rx="6" fill="#1e293b" stroke="#293548" stroke-width="1"/>
  <text x="635" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">SEARCH</text>
  <rect x="130" y="270" width="80" height="30" rx="6" fill="#1e293b" stroke="#293548" stroke-width="1"/>
  <text x="170" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">MEMORY</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui" font-size="13" fill="#94a3b8" letter-spacing="3" font-weight="600">AI AGENTS</text>
</svg>
